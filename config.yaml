external_models:
  vae: "madebyollin/sdxl-vae-fp16-fix"
  tokenizer: "openai/clip-vit-large-patch14"
  text_encoder: "openai/clip-vit-large-patch14"

diffusion:
  method: "ddpm"         # active training method: "ddpm" | "flow_matching"
  sampler: "ddim"        # active sampler: "ddim" | "ddpm" | "flow_matching"
  methods:
    ddpm:
      num_timesteps: 1000
      beta_start: 0.0001
      beta_end: 0.02
      learn_variance: True    # Improved DDPM: predict variance alongside noise
    flow_matching:
      num_timesteps: 1000
      use_minibatch_ot: False  # set True to enable minibatch OT noise reordering
  samplers:
    ddim: {}                  # sampler sub-config placeholder (eta passed at call site)
    ddpm: {}
    flow_matching: {}

dit:
  input_size: 64
  patch_size: [4, 4]        # (t, h, w) for video, (h, w) for image
  in_channels: 4            # Standard SDXL Latent channels
  hidden_size: 1024         # Reduced for faster training on 3090
  cond_dim: 768             # Matches CLIP ViT-L/14
  frequency_embedding_size: 256
  max_period: 10000
  max_frames: 512           # Video only
  depth: 18                 # Reduced from 28 for "simple" version
  num_heads: 16             # hidden_size / 64
  vae_scale_factor: 0.18215 # SDXL Standard

training:
  epochs: 160
  lr: 3.5e-4
  lr_scheduler: "cosine_with_warmup"  # or "constant"
  warmup_ratio: 0.02                  # fraction of total optimizer steps for warmup (ignored by "constant")
  lr_end: 1.0e-6              # The floor of the cosine decay
  weight_decay: 0.03
  mixed_precision: "bf16"   # Best for RTX 3090
  gradient_checkpointing: True
  use_reentrant: False
  batch_size: 384
  gradient_accumulation_steps: 1
  gradient_clip_norm: 1.0
  save_every_steps: 5000    # Save checkpoint every N optimizer steps
  checkpoint_dir: "checkpoints"
  resume_from_checkpoint: False  # set to "checkpoints/full_ckpt" to resume training
  inference_every_steps: 500  # Run inference every N optimizer steps; False = disabled
  inference_prompt: "A runner wearing a green shirt, with a beautiful mountains view."
  inference_height: 512    # must match data.image_size
  inference_width: 512     # must match data.image_size
  inference_eta: 0.0       # DDIM stochasticity; 0 = deterministic
  inference_steps: 50       # DDIM steps for in-training inference
  guidance_scale: 7.5      # CFG scale used during in-training inference
  cfg_dropout_prob: 0.1   # Fraction of samples trained without text conditioning (for CFG)

general:
  is_video: False           # Explicitly set for conditional logic
  wnb_project_name: "Home-Made-Diffusion"
  wnb_entity: "hidopinto-1-weizmann-institute-of-science"

data:
  dataset_name: "JotDe/mscoco_100k"
  split: "train"
  image_size: 512   # constraint: image_size / (2*grid_size) == dit.input_size
  image_key: "image"
  caption_key: "text"
  cache_dir: "cache"
  encoding_batch_size: 8
  num_workers: 8
