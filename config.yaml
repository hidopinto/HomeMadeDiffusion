external_models:
  vae: "madebyollin/sdxl-vae-fp16-fix"
  tokenizer: "openai/clip-vit-large-patch14"
  text_encoder: "openai/clip-vit-large-patch14"

diffusion:
  method: "ddpm"
  sampler: "ddim"       # "ddim" or "ddpm"
  ddpm:
    num_timesteps: 1000
    beta_start: 0.0001
    beta_end: 0.02

dit:
  input_size: 32
  patch_size: [2, 2]        # (t, h, w) for video, (h, w) for image
  in_channels: 4            # Standard SDXL Latent channels
  hidden_size: 1024         # Reduced for faster training on 3090
  cond_dim: 768             # Matches CLIP ViT-L/14
  frequency_embedding_size: 256
  max_period: 10000
  max_frames: 512           # Video only
  depth: 12                 # Reduced from 28 for "simple" version
  num_heads: 16             # hidden_size / 64
  learn_variance: False     # Simpler DDPM loss
  vae_scale_factor: 0.18215 # SDXL Standard

training:
  epochs: 100
  lr: 1.0e-4
  weight_decay: 0.01
  mixed_precision: "bf16"   # Best for RTX 3090
  gradient_checkpointing: True
  use_reentrant: False
  batch_size: 8
  save_every: 5             # Save checkpoint every N epochs
  checkpoint_dir: "checkpoints"
  inference_every: 1     # Run inference every N epochs; null = disabled
  inference_prompt: "A cute pokemon"
  # inference_prompt: A blue Turtwig standing on a wooden table, solid green background.
  # inference_prompt: "A blue Turtwig eating a burger"
  inference_steps: 50       # DDIM steps for in-training inference

general:
  is_video: False           # Explicitly set for conditional logic
  wnb_project_name: "Home-Made-Diffusion"
  wnb_entity: "hidopinto-1-weizmann-institute-of-science"

data:
  dataset_name: "diffusers/pokemon-gpt4-captions"
  split: "train"
  image_size: 256
  image_key: "image"
  caption_key: "text"
  cache_dir: "cache"
  encoding_batch_size: 8
  num_workers: 4
